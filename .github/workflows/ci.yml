name: CI

on:
    pull_request:
        branches:
            - "*.*"
            - master
    push:
        branches:
            - "*.*"
            - master

jobs:
    tests:
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                php-version:
                    - '8.1'
                    - '8.2'
                    - '8.3'
                    - '8.4'
                    - '8.5'
                symfony-version:
                    - '6.4.*'
                    - '7.4.*'
                    - '8.0.*'
                dependencies:
                    - 'highest'
                remove-dependencies: [ '' ]
                exclude:
                  - php-version: '8.1'
                    symfony-version: '7.4.*'
                  - php-version: '8.1'
                    symfony-version: '8.0.*'
                  - php-version: '8.2'
                    symfony-version: '8.0.*'
                  - php-version: '8.3'
                    symfony-version: '8.0.*'
                  - php-version: '8.4'
                    symfony-version: '6.4.*'
                  - php-version: '8.5'
                    symfony-version: '6.4.*'

        steps:
            - name: "Checkout"
              uses: "actions/checkout@v4"

            - name: "Install PHP"
              uses: "shivammathur/setup-php@v2"
              with:
                  tools: flex
                  php-version: "${{ matrix.php-version }}"
                  coverage: none

            - name: Remove dependencies
              if: "matrix.remove-dependencies != ''"
              run: composer remove --no-update ${{ matrix.remove-dependencies }}

            - name: "Install dependencies"
              uses: ramsey/composer-install@v2
              with:
                  dependency-versions: ${{ matrix.dependencies }}
              env:
                  SYMFONY_REQUIRE: "${{ matrix.symfony-version }}"

            - name: "Run tests"
              run: composer test

    coding-standard:
        runs-on: ubuntu-24.04
        name: Coding Standard
        steps:
            - name: "Checkout"
              uses: "actions/checkout@v4"

            - name: "Install PHP"
              uses: "shivammathur/setup-php@v2"
              with:
                  tools: flex
                  php-version: "8.3"

            - name: "Install dependencies"
              uses: ramsey/composer-install@v2

            - name: "Check coding standard"
              run: composer check-cs