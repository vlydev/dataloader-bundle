imports:
    - { resource: "services.yaml" }

framework:
    test: true
    secret: test
    router:
        utf8: true
        resource: "%kernel.project_dir%/config/routing.yaml"
    profiler:
        enabled: false

overblog_dataloader:
    defaults:
        promise_adapter: "overblog_dataloader.react_promise_adapter"
    loaders:
        users:
            alias: "yaml_users_loader"
            batch_load_fn: "Overblog\\DataLoaderBundle\\Tests\\Functional\\app\\UserDataStaticProvider::getUsersPromise"
